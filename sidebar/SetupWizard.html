<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Wizard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', 'Segoe UI', sans-serif;
      background: #F8F5FA;
      color: #2E1540;
      padding: 20px;
    }
    h2 {
      color: #2E1540;
      font-size: 18px;
      margin-bottom: 8px;
    }
    p { font-size: 13px; color: #5a4070; line-height: 1.5; margin-bottom: 12px; }
    .btn {
      display: inline-block;
      background: #2E1540;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #B892D4; }
  </style>
</head>
<body>
  <h2>Setup Wizard</h2>
  <p>Welcome to Trackulate! This wizard will guide you through setting up your spreadsheet.</p>
  <p>Click <strong>Get Started</strong> to begin.</p>
  <button class="btn" onclick="google.script.run.runSetupWizard()">Get Started</button>
</body>
</html>
