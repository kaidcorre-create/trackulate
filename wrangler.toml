name = "trackulate-ai-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Set your Anthropic API key as a secret (never commit it):
# Run: npx wrangler secret put ANTHROPIC_KEY
# Then paste your key from console.anthropic.com

[[routes]]
# Optional: bind to a custom domain
# pattern = "ai.trackulate.co.uk"
# zone_name = "trackulate.co.uk"
