name = "trackulate-ai-worker"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Workers AI binding
[ai]
binding = "AI"

# KV namespace for memory + rate limiting
# Create it first: npx wrangler kv namespace create TRACKULATE_KV
# Then paste the id from the output below
[[kv_namespaces]]
binding = "TRACKULATE_KV"
id      = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# Cron trigger — monthly email on 1st of month at 8am UTC
[triggers]
crons = ["0 8 1 * *"]

# Optional secrets (set with: npx wrangler secret put <NAME>)
# TRACKULATE_TOKEN — restrict Worker access to your sheet only
