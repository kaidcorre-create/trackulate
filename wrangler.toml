name = "trackulate"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Workers AI binding
[ai]
binding = "AI"

# KV — general memory + rate limiting
# Create: npx wrangler kv namespace create TRACKULATE_KV
[[kv_namespaces]]
binding = "TRACKULATE_KV"
id      = "937593573fd046e09e64e5eb99b0506b"

# KV — licence store (one entry per key)
# Create: npx wrangler kv namespace create TRACKULATE_LICENCES
# Then paste the returned id below
[[kv_namespaces]]
binding = "TRACKULATE_LICENCES"
id      = "PASTE_TRACKULATE_LICENCES_KV_ID_HERE"

# D1 — usage logging
# Create: npx wrangler d1 create trackulate_db
# Then paste the returned database_id below
# After creating, run the schema:
#   npx wrangler d1 execute trackulate_db --command \
#   "CREATE TABLE IF NOT EXISTS usage_log (id INTEGER PRIMARY KEY AUTOINCREMENT, licence_key TEXT NOT NULL, feature TEXT NOT NULL, sheet_id TEXT, timestamp TEXT NOT NULL);"
[[d1_databases]]
binding     = "DB"
database_name = "trackulate_db"
database_id = "PASTE_D1_DATABASE_ID_HERE"

# Cron trigger — monthly email on 1st of month at 8am UTC
[triggers]
crons = ["0 8 1 * *"]

# Secrets (set with: npx wrangler secret put <NAME>)
# TRACKULATE_TOKEN  — restrict main AI endpoint to your sheet
# ADMIN_SECRET      — protect /admin/create-licence endpoint
